# Markdownlint configuration
# https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

# Allow long lines (tables, URLs, code blocks)
MD013: false

# Allow duplicate headings in different sections
MD024:
  siblings_only: true

# Allow inline HTML (badges, etc.)
MD033: false

# Allow bare URLs
MD034: false

# Allow fenced code blocks without language specified
MD040: false

# Allow files to start without a top-level heading (prompt templates)
MD041: false

# Allow lists without surrounding blank lines
MD032: false

# Allow compact table style (pipes without spaces)
MD060: false
